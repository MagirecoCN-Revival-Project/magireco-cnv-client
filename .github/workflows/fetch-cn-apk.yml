name: Fetch CN APK → Release

on:
  workflow_dispatch:

jobs:
  fetch-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download CN APK
        run: |
          curl -L \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
            -H "Referer: https://pan.baidu.com/" \
            "https://lz0.qaiu.top/d/ce/pan.baidu.com_s_1ODr2D0TFo-ua3CvzSjx2cw?pwd=kf9w" \
            -o cn_base.apk
          ls -lh cn_base.apk
          file cn_base.apk

      - name: Upload to Release
        run: |
          # 如果 tag 已存在就先删掉
          gh release delete cn-apk-staging --yes 2>/dev/null || true
          git tag -d cn-apk-staging 2>/dev/null || true

          gh release create cn-apk-staging \
            --title "CN APK Staging (临时，用完请删)" \
            --notes "国服原版 APK，供资源比对用。对比完毕后请删除此 Release。" \
            --prerelease \
            cn_base.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
