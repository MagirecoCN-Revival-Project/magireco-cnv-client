name: 🔑 生成 APK 签名密钥

# ╔════════════════════════════════════════════════════════════════════╗
# ║   生成并输出用于 APK 签名的 JKS Keystore                            ║
# ╠════════════════════════════════════════════════════════════════════╣
# ║                                                                    ║
# ║ 用法                                                               ║
# ║ ────                                                               ║
# ║   1. 在此仓库的 Actions 页面手动触发本 workflow                      ║
# ║   2. 填写以下输入参数（或接受默认值）                                 ║
# ║      ▸ 密码留空则自动生成 32 位加密强随机密码                         ║
# ║      ▸ 勾选 auto_save_secrets 可自动将所有值写入仓库 Secrets         ║
# ║   3. 运行完成后，在 Job Summary 中查看生成的 Base64 keystore 及说明   ║
# ║                                                                    ║
# ║ 生成后需要配置的 Secrets（勾选 auto_save_secrets 则自动完成）         ║
# ║ ─────────────────────────────────────────────────────             ║
# ║   KEYSTORE_BASE64    — Base64 编码的 keystore 文件内容              ║
# ║   KEY_STORE_PASSWORD — keystore 密码                               ║
# ║   KEY_ALIAS          — key 别名                                    ║
# ║   KEY_PASSWORD       — key 密码                                    ║
# ║                                                                    ║
# ║ 安全说明                                                            ║
# ║ ──────                                                             ║
# ║   ▸ 密码在 Actions 日志中可见，请确保仓库访问权限管理得当             ║
# ║   ▸ keystore 文件本身不会提交到仓库，仅通过 Job Summary 传递         ║
# ║   ▸ 密钥一旦丢失无法恢复，请务必妥善保存 Base64 内容                 ║
# ║   ▸ 同一应用的所有版本必须用同一个 key 签名，密钥请勿随意更换         ║
# ║   ▸ auto_save_secrets 需要 GH_TOKEN Secret 具备 secrets:write 权限 ║
# ║                                                                    ║
# ╚════════════════════════════════════════════════════════════════════╝

on:
  workflow_dispatch:
    inputs:
      key_alias:
        description: 'Key 别名（KEY_ALIAS）'
        required: true
        default: 'android'
        type: string
      store_password:
        description: 'Keystore 与 Key 共用密码（KEY_STORE_PASSWORD / KEY_PASSWORD）— 留空则自动生成 32 位强密码'
        required: false
        default: ''
        type: string
      validity_years:
        description: '证书有效期（年）'
        required: false
        default: '27'
        type: string
      distinguished_name:
        description: '证书 Distinguished Name（DN）'
        required: false
        default: 'CN=MagirecoCN, OU=MagirecoCN-Revival-Project, O=MagirecoCN, L=CN, ST=CN, C=CN'
        type: string
      auto_save_secrets:
        description: '自动将生成的 4 个值写入仓库 Secrets（需要 GH_TOKEN 具备 secrets:write 权限）'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  gen-key:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      REPO: ${{ github.repository }}

    steps:
      - name: 🛡️ 校验输入参数
        run: |
          python3 <<'SCRIPT_END'
          import os, sys

          sys.stdout.reconfigure(line_buffering=True)

          class C:
              RESET         = "\033[0m"
              BOLD          = "\033[1m"
              RED           = "\033[31m"
              BRIGHT_GREEN  = "\033[92m"
              BRIGHT_YELLOW = "\033[93m"
              BRIGHT_BLUE   = "\033[94m"
              BRIGHT_WHITE  = "\033[97m"
              CYAN          = "\033[36m"

          def c(color, text): return f"{color}{text}{C.RESET}"
          def header(text):
              bar = "═" * 60
              print(f"\n{c(C.BOLD + C.BRIGHT_BLUE, bar)}")
              print(c(C.BOLD + C.BRIGHT_WHITE, f"  {text}"))
              print(f"{c(C.BOLD + C.BRIGHT_BLUE, bar)}\n", flush=True)
          def section(text): print(f"\n{c(C.BOLD + C.CYAN, '┌─ ' + text)}", flush=True)
          def info(t):  print(f"  {c(C.BRIGHT_BLUE,   'ℹ')} {t}", flush=True)
          def ok(t):    print(f"  {c(C.BRIGHT_GREEN,  '✔')} {t}", flush=True)
          def warn(t):  print(f"  {c(C.BRIGHT_YELLOW, '⚠')} {t}", flush=True)
          def err(t):   print(f"  {c(C.RED,           '✘')} {t}", flush=True)

          header("校验输入参数")

          alias       = os.environ.get("INPUT_KEY_ALIAS", "").strip()
          ks_pass     = os.environ.get("INPUT_STORE_PASSWORD", "").strip()
          validity    = os.environ.get("INPUT_VALIDITY_YEARS", "27").strip()
          dn          = os.environ.get("INPUT_DISTINGUISHED_NAME", "").strip()
          auto_save   = os.environ.get("INPUT_AUTO_SAVE_SECRETS", "false").lower() == "true"

          failed = False

          section("必填参数")
          if not alias:
              err("key_alias 不能为空")
              failed = True
          else:
              ok(f"key_alias: {alias}")

          if not validity.isdigit() or int(validity) < 1:
              err(f"validity_years 必须为正整数（当前: {validity!r}）")
              failed = True
          else:
              ok(f"validity_years: {validity} 年")

          if not dn:
              err("distinguished_name 不能为空")
              failed = True
          else:
              ok(f"DN: {dn}")

          section("密码参数")
          if not ks_pass:
              info("store_password 未填写 → 将自动生成 32 位强密码（Keystore 与 Key 共用）")
          elif len(ks_pass) < 6:
              err(f"store_password 长度不足 6 位（当前 {len(ks_pass)} 位）")
              failed = True
          else:
              ok(f"store_password: 已提供（{'*' * len(ks_pass)}），Keystore 与 Key 共用此密码")

          section("自动写入 Secrets")
          if auto_save:
              gh_token = os.environ.get("GH_TOKEN", "").strip()
              if not gh_token:
                  err("auto_save_secrets=true 但 GH_TOKEN Secret 未配置，无法写入 Secrets")
                  failed = True
              else:
                  ok("auto_save_secrets: 已启用（GH_TOKEN 已配置）")
          else:
              info("auto_save_secrets: 未启用，生成后需手动配置 Secrets")

          if failed:
              sys.exit(1)

          warn("⚠  密码字段在日志中可见——请确保只有可信成员能访问本仓库的 Actions 记录")
          SCRIPT_END
        env:
          INPUT_KEY_ALIAS:           ${{ inputs.key_alias }}
          INPUT_STORE_PASSWORD:      ${{ inputs.store_password }}
          INPUT_VALIDITY_YEARS:      ${{ inputs.validity_years }}
          INPUT_DISTINGUISHED_NAME:  ${{ inputs.distinguished_name }}
          INPUT_AUTO_SAVE_SECRETS:   ${{ inputs.auto_save_secrets }}

      - name: ☕ 设置 JDK 17（提供 keytool）
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🔑 生成 Keystore
        id: keygen
        run: |
          python3 <<'SCRIPT_END'
          import subprocess, os, sys, base64, secrets as sec_mod

          sys.stdout.reconfigure(line_buffering=True)

          class C:
              RESET         = "\033[0m"
              BOLD          = "\033[1m"
              DIM           = "\033[2m"
              RED           = "\033[31m"
              BRIGHT_GREEN  = "\033[92m"
              BRIGHT_YELLOW = "\033[93m"
              BRIGHT_BLUE   = "\033[94m"
              BRIGHT_CYAN   = "\033[96m"
              BRIGHT_WHITE  = "\033[97m"
              CYAN          = "\033[36m"

          def c(color, text): return f"{color}{text}{C.RESET}"
          def header(text):
              bar = "═" * 60
              print(f"\n{c(C.BOLD + C.BRIGHT_BLUE, bar)}")
              print(c(C.BOLD + C.BRIGHT_WHITE, f"  {text}"))
              print(f"{c(C.BOLD + C.BRIGHT_BLUE, bar)}\n", flush=True)
          def section(text): print(f"\n{c(C.BOLD + C.CYAN, '┌─ ' + text)}", flush=True)
          def info(t):  print(f"  {c(C.BRIGHT_BLUE,   'ℹ')} {t}", flush=True)
          def ok(t):    print(f"  {c(C.BRIGHT_GREEN,  '✔')} {t}", flush=True)
          def warn(t):  print(f"  {c(C.BRIGHT_YELLOW, '⚠')} {t}", flush=True)
          def err(t):   print(f"  {c(C.RED,           '✘')} {t}", flush=True)

          def set_output(key, value):
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write(f"{key}={value}\n")

          def run(cmd, **kw):
              r = subprocess.run(cmd, shell=True, capture_output=True, text=True, **kw)
              if r.returncode != 0:
                  err("命令执行失败")
                  print(r.stdout)
                  print(r.stderr)
                  sys.exit(1)
              return r.stdout.strip()

          def gen_strong_password():
              """生成 32 位 URL-safe Base64 强密码（仅含 [A-Za-z0-9_-]，对 shell 完全安全）"""
              return sec_mod.token_urlsafe(24)  # 24 bytes → 32 chars base64url

          header("生成 APK 签名 Keystore")

          alias      = os.environ["INPUT_KEY_ALIAS"].strip()
          ks_pass    = os.environ.get("INPUT_STORE_PASSWORD", "").strip()
          validity_y = int(os.environ.get("INPUT_VALIDITY_YEARS", "27").strip())
          dn         = os.environ["INPUT_DISTINGUISHED_NAME"].strip()
          ks_path    = "/tmp/release.keystore"
          validity_d = validity_y * 365

          # ── 密码处理：Keystore 与 Key 共用同一密码，留空则自动生成 ──────
          section("密码处理")
          if not ks_pass:
              ks_pass = gen_strong_password()
              ok(f"密码已自动生成（32 位强密码）: {c(C.BRIGHT_CYAN, ks_pass)}")
          else:
              ok(f"密码: 使用用户提供值（{'*' * len(ks_pass)}）")
          # Keystore 密码与 Key 密码必须相同，统一使用 ks_pass
          key_pass = ks_pass
          info("KEY_PASSWORD = KEY_STORE_PASSWORD（Android 要求两者一致）")

          # ── keytool 生成密钥对 ────────────────────────────────────────
          section("运行 keytool 生成 RSA-2048 密钥对")
          info(f"别名:     {alias}")
          info(f"有效期:   {validity_y} 年（{validity_d} 天）")
          info(f"DN:       {dn}")
          info(f"算法:     RSA 2048")

          run(
              f'keytool -genkeypair '
              f'-v '
              f'-keystore "{ks_path}" '
              f'-alias "{alias}" '
              f'-keyalg RSA '
              f'-keysize 2048 '
              f'-validity {validity_d} '
              f'-storepass "{ks_pass}" '
              f'-keypass "{key_pass}" '
              f'-dname "{dn}" '
              f'-storetype JKS '
              f'-noprompt'
          )

          ks_size = os.path.getsize(ks_path)
          ok(f"Keystore 生成完成: {ks_path}（{ks_size} bytes）")

          # ── Base64 编码 ───────────────────────────────────────────────
          section("Base64 编码 Keystore")
          with open(ks_path, "rb") as f:
              ks_b64 = base64.b64encode(f.read()).decode("ascii")
          ok(f"Base64 长度: {len(ks_b64)} 字符")

          # 将所有值传给后续步骤（通过 GITHUB_OUTPUT）
          set_output("ks_b64",      ks_b64)
          set_output("ks_alias",    alias)
          set_output("ks_pass",     ks_pass)
          set_output("key_pass",    key_pass)
          set_output("ks_size",     str(ks_size))
          SCRIPT_END
        env:
          INPUT_KEY_ALIAS:          ${{ inputs.key_alias }}
          INPUT_STORE_PASSWORD:     ${{ inputs.store_password }}
          INPUT_VALIDITY_YEARS:     ${{ inputs.validity_years }}
          INPUT_DISTINGUISHED_NAME: ${{ inputs.distinguished_name }}

      - name: 💾 自动写入仓库 Secrets（可选）
        if: ${{ inputs.auto_save_secrets == true }}
        run: |
          python3 <<'SCRIPT_END'
          import subprocess, os, sys

          sys.stdout.reconfigure(line_buffering=True)

          class C:
              RESET         = "\033[0m"
              BOLD          = "\033[1m"
              DIM           = "\033[2m"
              RED           = "\033[31m"
              BRIGHT_GREEN  = "\033[92m"
              BRIGHT_YELLOW = "\033[93m"
              BRIGHT_BLUE   = "\033[94m"
              BRIGHT_WHITE  = "\033[97m"
              CYAN          = "\033[36m"

          def c(color, text): return f"{color}{text}{C.RESET}"
          def header(text):
              bar = "═" * 60
              print(f"\n{c(C.BOLD + C.BRIGHT_BLUE, bar)}")
              print(c(C.BOLD + C.BRIGHT_WHITE, f"  {text}"))
              print(f"{c(C.BOLD + C.BRIGHT_BLUE, bar)}\n", flush=True)
          def section(text): print(f"\n{c(C.BOLD + C.CYAN, '┌─ ' + text)}", flush=True)
          def info(t):  print(f"  {c(C.BRIGHT_BLUE,   'ℹ')} {t}", flush=True)
          def ok(t):    print(f"  {c(C.BRIGHT_GREEN,  '✔')} {t}", flush=True)
          def warn(t):  print(f"  {c(C.BRIGHT_YELLOW, '⚠')} {t}", flush=True)
          def err(t):   print(f"  {c(C.RED,           '✘')} {t}", flush=True)

          def set_secret(name, value, repo):
              """使用 gh secret set 写入仓库 Secret"""
              r = subprocess.run(
                  ["gh", "secret", "set", name,
                   "--body", value,
                   "--repo", repo],
                  capture_output=True, text=True
              )
              return r.returncode == 0, r.stderr.strip()

          header("自动写入仓库 Secrets")

          repo    = os.environ["REPO"]
          ks_b64  = os.environ["KS_B64"]
          ks_pass = os.environ["KS_PASS"]
          k_alias = os.environ["KS_ALIAS"]
          k_pass  = os.environ["KEY_PASS"]

          section(f"写入目标仓库: {repo}")

          secrets_to_set = [
              ("KEYSTORE_BASE64",    ks_b64,  "Base64 编码 keystore"),
              ("KEY_STORE_PASSWORD", ks_pass, "Keystore 密码"),
              ("KEY_ALIAS",          k_alias, "Key 别名"),
              ("KEY_PASSWORD",       k_pass,  "Key 密码"),
          ]

          failed = False
          for secret_name, secret_value, desc in secrets_to_set:
              success, stderr = set_secret(secret_name, secret_value, repo)
              if success:
                  ok(f"{secret_name:<22} → 写入成功（{desc}）")
              else:
                  err(f"{secret_name:<22} → 写入失败: {stderr}")
                  failed = True

          if failed:
              print(flush=True)
              err("部分 Secret 写入失败，请检查 GH_TOKEN 是否具备 secrets:write 权限")
              sys.exit(1)

          section("完成")
          info("所有 Secret 已写入，build-apk.yml 可直接使用，无需手动配置")
          warn("请妥善备份 Job Summary 中的 Base64 Keystore——丢失后将无法为同一 App 签名")
          SCRIPT_END
        env:
          KS_B64:   ${{ steps.keygen.outputs.ks_b64 }}
          KS_PASS:  ${{ steps.keygen.outputs.ks_pass }}
          KS_ALIAS: ${{ steps.keygen.outputs.ks_alias }}
          KEY_PASS: ${{ steps.keygen.outputs.key_pass }}

      - name: 📋 输出配置说明（日志）
        run: |
          python3 <<'SCRIPT_END'
          import os, sys

          sys.stdout.reconfigure(line_buffering=True)

          class C:
              RESET         = "\033[0m"
              BOLD          = "\033[1m"
              DIM           = "\033[2m"
              RED           = "\033[31m"
              BRIGHT_GREEN  = "\033[92m"
              BRIGHT_YELLOW = "\033[93m"
              BRIGHT_BLUE   = "\033[94m"
              BRIGHT_CYAN   = "\033[96m"
              BRIGHT_WHITE  = "\033[97m"
              CYAN          = "\033[36m"

          def c(color, text): return f"{color}{text}{C.RESET}"
          def header(text):
              bar = "═" * 60
              print(f"\n{c(C.BOLD + C.BRIGHT_BLUE, bar)}")
              print(c(C.BOLD + C.BRIGHT_WHITE, f"  {text}"))
              print(f"{c(C.BOLD + C.BRIGHT_BLUE, bar)}\n", flush=True)
          def section(text): print(f"\n{c(C.BOLD + C.CYAN, '┌─ ' + text)}", flush=True)
          def info(t):  print(f"  {c(C.BRIGHT_BLUE,   'ℹ')} {t}", flush=True)
          def ok(t):    print(f"  {c(C.BRIGHT_GREEN,  '✔')} {t}", flush=True)
          def warn(t):  print(f"  {c(C.BRIGHT_YELLOW, '⚠')} {t}", flush=True)

          header("生成结果汇总")

          ks_b64      = os.environ["KS_B64"]
          ks_alias    = os.environ["KS_ALIAS"]
          ks_pass     = os.environ["KS_PASS"]
          key_pass    = os.environ["KEY_PASS"]
          ks_size     = os.environ["KS_SIZE"]
          repo        = os.environ.get("REPO", "")
          auto_saved  = os.environ.get("INPUT_AUTO_SAVE_SECRETS", "false").lower() == "true"

          section("密钥信息")
          ok(f"Keystore 大小:  {ks_size} bytes")
          ok(f"Key 别名:       {ks_alias}")
          ok(f"共用密码（KEY_STORE_PASSWORD = KEY_PASSWORD）: {c(C.BRIGHT_CYAN, ks_pass)}")
          ok(f"目标仓库:       {repo}")

          if auto_saved:
              section("Secrets 状态")
              ok("所有 4 个 Secret 已自动写入仓库，build-apk.yml 可立即使用")
          else:
              section("手动配置步骤")
              info("前往 Settings → Secrets and variables → Actions → Secrets，添加：")
              print(flush=True)
              secrets = [
                  ("KEYSTORE_BASE64",    "<见下方 Base64 内容>",  "Base64 编码的 Keystore 文件"),
                  ("KEY_STORE_PASSWORD", ks_pass,                 "Keystore 密码（已在上方显示）"),
                  ("KEY_ALIAS",          ks_alias,                "Key 别名"),
                  ("KEY_PASSWORD",       key_pass,                "Key 密码（已在上方显示）"),
              ]
              for name, hint, desc in secrets:
                  print(f"  {c(C.BOLD + C.BRIGHT_WHITE, name)}")
                  print(f"    值:  {c(C.BRIGHT_CYAN, hint)}")
                  print(f"    说明: {c(C.DIM, desc)}", flush=True)

          section("KEYSTORE_BASE64 内容（完整复制，不含多余空白）")
          print(flush=True)
          print(ks_b64)
          print(flush=True)

          warn("密钥是不可逆签名凭证，一旦丢失将无法为同一 App 发布更新，请务必备份！")
          SCRIPT_END
        env:
          KS_B64:                  ${{ steps.keygen.outputs.ks_b64 }}
          KS_ALIAS:                ${{ steps.keygen.outputs.ks_alias }}
          KS_PASS:                 ${{ steps.keygen.outputs.ks_pass }}
          KEY_PASS:                ${{ steps.keygen.outputs.key_pass }}
          KS_SIZE:                 ${{ steps.keygen.outputs.ks_size }}
          INPUT_AUTO_SAVE_SECRETS: ${{ inputs.auto_save_secrets }}

      - name: 📄 写入 Job Summary
        run: |
          python3 <<'SCRIPT_END'
          import os

          ks_b64      = os.environ["KS_B64"]
          ks_alias    = os.environ["KS_ALIAS"]
          ks_pass     = os.environ["KS_PASS"]
          key_pass    = os.environ["KEY_PASS"]
          ks_size     = os.environ["KS_SIZE"]
          repo        = os.environ.get("REPO", "")
          auto_saved  = os.environ.get("INPUT_AUTO_SAVE_SECRETS", "false").lower() == "true"
          summary_f   = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null")

          if auto_saved:
              secrets_note = (
                  "✅ **所有 Secret 已自动写入仓库**，`build-apk.yml` 可立即使用。\n\n"
                  "以下 4 个 Secret 已配置完成：\n"
                  "- `KEYSTORE_BASE64`\n"
                  "- `KEY_STORE_PASSWORD`\n"
                  "- `KEY_ALIAS`\n"
                  "- `KEY_PASSWORD`\n"
              )
          else:
              secrets_note = (
                  "⚠️ **需手动配置 Secrets**（Settings → Secrets and variables → Actions → Secrets）：\n\n"
                  "| Secret 名称 | 值 |\n"
                  "|-------------|-----|\n"
                  f"| `KEYSTORE_BASE64` | 下方 Base64 内容（完整复制） |\n"
                  f"| `KEY_STORE_PASSWORD` | `{ks_pass}` |\n"
                  f"| `KEY_ALIAS` | `{ks_alias}` |\n"
                  f"| `KEY_PASSWORD` | `{ks_pass}`（与 KEY_STORE_PASSWORD 相同） |\n"
              )

          lines = [
              "## 🔑 APK 签名 Keystore 已生成",
              "",
              "### 密钥信息",
              "",
              f"| 字段 | 值 |",
              f"|------|-----|",
              f"| Key 别名 | `{ks_alias}` |",
              f"| Keystore 大小 | {ks_size} bytes |",
              f"| 共用密码（KEY_STORE_PASSWORD = KEY_PASSWORD） | `{ks_pass}` |",
              f"| 目标仓库 | `{repo}` |",
              "",
              "### Secrets 配置",
              "",
              secrets_note,
              "",
              "### KEYSTORE_BASE64 内容",
              "",
              "```",
              ks_b64,
              "```",
              "",
              "> ⚠️ **重要**：请将以上 Base64 内容备份到安全位置。",
              "> 密钥一旦丢失，将无法为同一 App 发布后续更新。",
          ]

          with open(summary_f, "w", encoding="utf-8") as f:
              f.write("\n".join(lines))
          SCRIPT_END
        env:
          KS_B64:                  ${{ steps.keygen.outputs.ks_b64 }}
          KS_ALIAS:                ${{ steps.keygen.outputs.ks_alias }}
          KS_PASS:                 ${{ steps.keygen.outputs.ks_pass }}
          KEY_PASS:                ${{ steps.keygen.outputs.key_pass }}
          KS_SIZE:                 ${{ steps.keygen.outputs.ks_size }}
          INPUT_AUTO_SAVE_SECRETS: ${{ inputs.auto_save_secrets }}
