name: 🧹 删除冗余贡献者 URL 变量（一次性，执行后自动删除）

# 贡献者名单已改为 /client/init 在握手阶段下发，CI 不再注入贡献者 URL。
# 此 Workflow 一次性删除当初由 seed-url-vars.yml 写入、现已冗余的仓库变量，
# 执行完毕后通过 Contents API 删除本文件自身（自毁）。
#
# 不删除仍在使用的：CNV_CAP_WORKER_URL / CNV_HOME_URL / CNV_GITHUB_URL。

on:
  workflow_dispatch:

permissions:
  contents: write   # 自毁提交
  actions:  write   # 读写 Actions Variables

jobs:
  cleanup-and-destroy:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
      REPO:     ${{ github.repository }}

    steps:
      - name: 🧹 删除冗余 URL 变量
        run: |
          python3 <<'SCRIPT_END'
          import urllib.request, urllib.error, os, sys

          sys.stdout.reconfigure(line_buffering=True)

          token = os.environ['GH_TOKEN']
          repo  = os.environ['REPO']

          headers = {
              'Authorization':        f'Bearer {token}',
              'Accept':               'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
          }

          # 现已冗余的贡献者相关变量（名单改为 /client/init 下发）
          STALE_VARS = [
              'CNV_BILI_CYBERNOVA',
              'CNV_BILI_MADEINMAGIUS',
              'CNV_BILI_SHUIYIN',
              'CNV_BILI_SEGFAULT',
              'CNV_AVATAR_CYBERNOVA',
              'CNV_AVATAR_MADEINMAGIUS',
              'CNV_AVATAR_SHUIYIN',
              'CNV_AVATAR_SEGFAULT',
          ]

          def delete_var(name):
              url = f'https://api.github.com/repos/{repo}/actions/variables/{name}'
              req = urllib.request.Request(url, headers=headers, method='DELETE')
              try:
                  urllib.request.urlopen(req)
                  return 'deleted'
              except urllib.error.HTTPError as e:
                  if e.code == 404:
                      return 'absent'   # 已不存在，视为成功
                  raise RuntimeError(f'DELETE {name} 失败 HTTP {e.code}: {e.read().decode()}')

          failed = False
          for name in STALE_VARS:
              try:
                  action = delete_var(name)
                  print(f'  ✔ {name} ({action})')
              except RuntimeError as e:
                  print(f'  ✘ {e}', file=sys.stderr)
                  failed = True

          if failed:
              print('::error::部分变量删除失败，请检查 GH_TOKEN 权限（需要 actions:write）')
              sys.exit(1)

          print('冗余变量清理完成。')
          SCRIPT_END

      - name: 💣 自毁（删除本 Workflow 文件）
        run: |
          python3 <<'SCRIPT_END'
          import json, urllib.request, urllib.error, os, sys

          sys.stdout.reconfigure(line_buffering=True)

          token  = os.environ['GH_TOKEN']
          repo   = os.environ['REPO']
          branch = os.environ.get('GITHUB_REF_NAME', '')
          path   = '.github/workflows/cleanup-contributor-vars.yml'

          headers = {
              'Authorization':        f'Bearer {token}',
              'Accept':               'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
          }

          url_file = f'https://api.github.com/repos/{repo}/contents/{path}?ref={branch}'
          req = urllib.request.Request(url_file, headers=headers)
          try:
              with urllib.request.urlopen(req) as resp:
                  sha = json.loads(resp.read())['sha']
          except urllib.error.HTTPError as e:
              print(f'::warning::获取文件 SHA 失败（{e.code}），跳过自毁步骤', file=sys.stderr)
              sys.exit(0)

          body = json.dumps({
              'message': 'ci: cleanup-contributor-vars 执行完毕，自动删除',
              'sha':     sha,
              'branch':  branch,
          }).encode()
          req = urllib.request.Request(
              f'https://api.github.com/repos/{repo}/contents/{path}',
              data=body,
              headers={**headers, 'Content-Type': 'application/json'},
              method='DELETE',
          )
          try:
              urllib.request.urlopen(req)
              print(f'✔ {path} 已从 {branch} 删除（自毁完成）')
          except urllib.error.HTTPError as e:
              print(f'::warning::自毁失败（{e.code}），请手动删除 {path}', file=sys.stderr)
          SCRIPT_END
