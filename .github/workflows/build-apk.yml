      - name: 🛠 编译 libMagiaClient.so（cnv-native）
        run: |
          set -euo pipefail

          # GitHub ubuntu-latest 预装多版本 NDK 在 /usr/local/lib/android/sdk/ndk/
          # 选最高已装版本即可；CMake toolchain 跨次版本兼容。
          NDK_ROOT="${ANDROID_NDK_HOME:-}"
          if [ -z "$NDK_ROOT" ] || [ ! -d "$NDK_ROOT" ]; then
              NDK_BASE="${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}/ndk"
              NDK_ROOT="$(ls -1d $NDK_BASE/* 2>/dev/null | sort -V | tail -1)"
          fi
          if [ -z "$NDK_ROOT" ] || [ ! -d "$NDK_ROOT" ]; then
              echo "::error::找不到 Android NDK"
              exit 1
          fi
          echo "[NDK] 使用 $NDK_ROOT"

          # 确保 ninja 在 PATH 里
          if ! command -v ninja >/dev/null; then
              sudo apt-get install -y ninja-build
          fi

          for ABI in arm64-v8a armeabi-v7a; do
              echo "==== 构建 $ABI ===="
              BUILD_DIR="cnv-native/build/$ABI"
              cmake -G Ninja \
                  -DCMAKE_TOOLCHAIN_FILE="$NDK_ROOT/build/cmake/android.toolchain.cmake" \
                  -DANDROID_ABI="$ABI" \
                  -DANDROID_PLATFORM=android-21 \
                  -DCMAKE_BUILD_TYPE=Release \
                  -B "$BUILD_DIR" cnv-native
              cmake --build "$BUILD_DIR" --parallel

              SO="$BUILD_DIR/libMagiaClient.so"
              if [ ! -f "$SO" ]; then
                  echo "::error::$SO 未生成"
                  exit 1
              fi
              mkdir -p "lib/$ABI"
              cp "$SO" "lib/$ABI/libMagiaClient.so"

              # 顺手做一次 strip（NDK 自带 llvm-strip），减小体积
              STRIP="$(find "$NDK_ROOT/toolchains/llvm/prebuilt" -name llvm-strip 2>/dev/null | head -1)"
              if [ -n "$STRIP" ]; then
                  "$STRIP" --strip-unneeded "lib/$ABI/libMagiaClient.so"
              fi

              echo "[$ABI] $(du -h lib/$ABI/libMagiaClient.so | cut -f1)"
          done

