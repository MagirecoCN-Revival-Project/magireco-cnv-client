      - name: 🔏 签名 APK（apksigner）
        id: sign
        run: |
          python3 <<'SCRIPT_END'
          import subprocess, os, sys, base64

          sys.stdout.reconfigure(line_buffering=True)

          class C:
              RESET         = "\033[0m"
              BOLD          = "\033[1m"
              RED           = "\033[31m"
              BRIGHT_GREEN  = "\033[92m"
              BRIGHT_YELLOW = "\033[93m"
              BRIGHT_BLUE   = "\033[94m"
              BRIGHT_WHITE  = "\033[97m"
              CYAN          = "\033[36m"

          def c(color, text): return f"{color}{text}{C.RESET}"
          def header(text):
              bar = "═" * 60
              print(f"\n{c(C.BOLD + C.BRIGHT_BLUE, bar)}")
              print(c(C.BOLD + C.BRIGHT_WHITE, f"  {text}"))
              print(f"{c(C.BOLD + C.BRIGHT_BLUE, bar)}\n", flush=True)
          def section(text): print(f"\n{c(C.BOLD + C.CYAN, '┌─ ' + text)}", flush=True)
          def info(t):  print(f"  {c(C.BRIGHT_BLUE,   'ℹ')} {t}", flush=True)
          def ok(t):    print(f"  {c(C.BRIGHT_GREEN,  '✔')} {t}", flush=True)
          def warn(t):  print(f"  {c(C.BRIGHT_YELLOW, '⚠')} {t}", flush=True)
          def err(t):   print(f"  {c(C.RED,           '✘')} {t}", flush=True)

          def set_output(key, value):
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write(f"{key}={value}\n")

          def run(cmd, **kw):
              r = subprocess.run(cmd, shell=True, capture_output=True, text=True, **kw)
              if r.returncode != 0:
                  err(f"命令失败: {cmd}")
                  err(r.stderr.strip())
                  sys.exit(1)
              return r.stdout.strip()

          header("签名 APK（apksigner）")

          bt_dir   = os.environ["BT_DIR"]
          apk_name = os.environ["APK_NAME"]
          ks_b64   = os.environ.get("KEYSTORE_BASE64", "")
          ks_pass  = os.environ.get("KEY_STORE_PASSWORD", "")
          k_alias  = os.environ.get("KEY_ALIAS", "")
          k_pass   = os.environ.get("KEY_PASSWORD", "")

          if not ks_b64.strip():
              warn("未配置 KEYSTORE_BASE64 secret，跳过签名步骤")
              warn("请先运行 gen-signing-key.yml 生成签名密钥，再配置 Secrets")
              set_output("signed_apk", "")
              sys.exit(0)

          section("解码 keystore")
          ks_path = "/tmp/release.keystore"
          with open(ks_path, "wb") as f:
              f.write(base64.b64decode(ks_b64))
          info(f"keystore 已写入: {ks_path}（{os.path.getsize(ks_path):,} bytes）")

          section("运行 apksigner")
          signed_apk = f"build/{apk_name}"
          run(
              f'"{bt_dir}/apksigner" sign '
              f'--ks "{ks_path}" '
              f'--ks-pass "pass:{ks_pass}" '
              f'--ks-key-alias "{k_alias}" '
              f'--key-pass "pass:{k_pass}" '
              f'--out "{signed_apk}" '
              f'build/aligned.apk'
          )

          ok(f"签名完成: {signed_apk}（{os.path.getsize(signed_apk):,} bytes）")
          set_output("signed_apk", signed_apk)
          SCRIPT_END
        env:
          BT_DIR:             ${{ steps.tools.outputs.bt_dir }}
          APK_NAME:           ${{ steps.version.outputs.apk_name }}
          KEYSTORE_BASE64:    ${{ secrets.KEYSTORE_BASE64 }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS:          ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:       ${{ secrets.KEY_PASSWORD }}

      - name: 🚀 发布到 GitHub Release
        if: steps.sign.outputs.signed_apk != ''
        run: |
          python3 <<'SCRIPT_END'
          import subprocess, os, sys, json, urllib.request

          sys.stdout.reconfigure(line_buffering=True)

          class C:
              RESET         = "\033[0m"
              BOLD          = "\033[1m"
              RED           = "\033[31m"
              BRIGHT_GREEN  = "\033[92m"
              BRIGHT_YELLOW = "\033[93m"
              BRIGHT_BLUE   = "\033[94m"
              BRIGHT_WHITE  = "\033[97m"
              CYAN          = "\033[36m"

          def c(color, text): return f"{color}{text}{C.RESET}"
          def header(text):
              bar = "═" * 60
              print(f"\n{c(C.BOLD + C.BRIGHT_BLUE, bar)}")
              print(c(C.BOLD + C.BRIGHT_WHITE, f"  {text}"))
              print(f"{c(C.BOLD + C.BRIGHT_BLUE, bar)}\n", flush=True)
          def section(text): print(f"\n{c(C.BOLD + C.CYAN, '┌─ ' + text)}", flush=True)
          def info(t):  print(f"  {c(C.BRIGHT_BLUE,   'ℹ')} {t}", flush=True)
          def ok(t):    print(f"  {c(C.BRIGHT_GREEN,  '✔')} {t}", flush=True)
          def warn(t):  print(f"  {c(C.BRIGHT_YELLOW, '⚠')} {t}", flush=True)
          def err(t):   print(f"  {c(C.RED,           '✘')} {t}", flush=True)

          def run(cmd, **kw):
              r = subprocess.run(cmd, shell=True, capture_output=True, text=True, **kw)
              return r

          header("发布到 GitHub Release")

          tag_name         = os.environ["TAG_NAME"]
          new_version      = os.environ["NEW_VERSION"]
          new_code         = os.environ["NEW_CODE"]
          apk_name         = os.environ["APK_NAME"]
          signed_apk       = os.environ["SIGNED_APK"]
          repo             = os.environ["REPO"]
          token            = os.environ.get("GH_TOKEN", "")
          event_name       = os.environ.get("GITHUB_EVENT_NAME", "push")
          bump_major       = os.environ.get("INPUT_BUMP_MAJOR", "false").lower() == "true"
          commit_sha_full  = os.environ.get("GITHUB_SHA", "unknown")
          commit_sha       = commit_sha_full[:7]

          if event_name == "push":
              trigger_note = "自动构建（push 触发）"
          elif bump_major:
              trigger_note = "手动大版本升级"
          else:
              trigger_note = "手动构建"

          # ── 查询上次同类型 Release 标签（push→Pre-release，手动→Release）──
          is_prerelease = (event_name == "push")
          last_tag = None
          section("查询上次同类型 Release")
          try:
              api_url = f"https://api.github.com/repos/{repo}/releases?per_page=100"
              req = urllib.request.Request(api_url, headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              })
              with urllib.request.urlopen(req) as resp:
                  for rel in json.loads(resp.read()):
                      if rel.get("draft"):
                          continue
                      if rel.get("prerelease") == is_prerelease:
                          last_tag = rel["tag_name"]
                          break
              if last_tag:
                  info(f"上次{'预发布' if is_prerelease else '正式发布'}: {last_tag}")
              else:
                  info("未找到同类型历史 Release，标注为首次发布")
          except Exception as e:
              warn(f"查询历史 Release 失败: {e}")

          # ── 获取自上次 Release 以来的提交记录（GitHub Compare API）────
          change_lines = []
          if last_tag:
              try:
                  cmp_url = (f"https://api.github.com/repos/{repo}/compare"
                             f"/{last_tag}...{commit_sha_full}")
                  req = urllib.request.Request(cmp_url, headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  })
                  with urllib.request.urlopen(req) as resp:
                      data = json.loads(resp.read())
                  commits = data.get("commits", [])
                  total   = data.get("total_commits", len(commits))
                  MAX_SHOW = 50
                  for cmt in commits[:MAX_SHOW]:
                      first_line = cmt["commit"]["message"].splitlines()[0]
                      sha7       = cmt["sha"][:7]
                      change_lines.append(f"- {first_line} (`{sha7}`)")
                  if total > MAX_SHOW:
                      change_lines.append(f"- ……共 {total} 条，仅显示前 {MAX_SHOW} 条")
                  if not change_lines:
                      change_lines = ["- 无新提交"]
                  ok(f"自 {last_tag} 以来共 {total} 条提交")
              except Exception as e:
                  warn(f"获取提交记录失败: {e}")
                  change_lines = ["- 无法获取提交记录"]
          else:
              change_lines = ["- 首次发布"]

          changes_section = ["### 功能更改", ""] + change_lines + [""]

          # ── 构建 Release 描述 ─────────────────────────────────────────
          release_notes = "\n".join([
              f"## 魔法纪录：Magia☆Record {new_version}",
              "",
              f"| 字段 | 值 |",
              f"|------|-----|",
              f"| 版本号 | `{new_version}` |",
              f"| VersionCode | `{new_code}` |",
              f"| 构建方式 | {trigger_note} |",
              f"| 源码提交 | `{commit_sha}` |",
              "",
              *changes_section,
              "### 安装说明",
              f"1. 下载 `{apk_name}` 并安装到 Android 设备",
              "2. 首次启动将自动下载国服资源（请确保网络畅通）",
              "3. 资源下载完成后即可正常游戏",
          ])

          # push 自动触发 → Pre-release；手动触发 → 正式 Release
          prerelease_flag = "--prerelease" if event_name == "push" else ""

          # 写到临时文件，避免 Release notes 含单引号时 shell 引号转义问题
          notes_file = "/tmp/release_notes.md"
          with open(notes_file, "w", encoding="utf-8") as nf:
              nf.write(release_notes)

          section(f"创建 Release {tag_name}{'（预发布）' if prerelease_flag else '（正式发布）'}")
          r = run(
              f'gh release create "{tag_name}" '
              f'--title "魔法纪录CN {new_version}" '
              f'--notes-file "{notes_file}" '
              f'{prerelease_flag} '
              f'--repo "{repo}"'
          )
          if r.returncode != 0:
              if "already exists" in r.stderr or "already_exists" in r.stderr:
                  warn(f"Release {tag_name} 已存在，仅上传新 APK")
              else:
                  err(f"创建 Release 失败:\n{r.stderr}")
                  sys.exit(1)
          else:
              ok(f"Release {tag_name} 已创建")

          section(f"上传 APK：{apk_name}")
          r = run(
              f'gh release upload "{tag_name}" "{signed_apk}" '
              f'--clobber '
              f'--repo "{repo}"'
          )
          if r.returncode != 0:
              err(f"上传 APK 失败:\n{r.stderr}")
              sys.exit(1)
          ok(f"APK 上传完成: {apk_name}")
          SCRIPT_END
        env:
          # 覆盖 job 级 GH_TOKEN，强制以 github-actions[bot] 身份发布 Release
          GH_TOKEN:         ${{ github.token }}
          TAG_NAME:         ${{ steps.version.outputs.tag_name }}
          NEW_VERSION:      ${{ steps.version.outputs.new_version }}
          NEW_CODE:         ${{ steps.version.outputs.new_code }}
          APK_NAME:         ${{ steps.version.outputs.apk_name }}
          SIGNED_APK:       ${{ steps.sign.outputs.signed_apk }}
          INPUT_BUMP_MAJOR: ${{ inputs.bump_major }}

      - name: 💾 保存新版本号到 GitHub Variables
        if: steps.sign.outputs.signed_apk != ''
        run: |
          python3 <<'SCRIPT_END'
          import json, urllib.request, urllib.error, os, sys

          sys.stdout.reconfigure(line_buffering=True)

          class C:
              RESET         = "\033[0m"
              BOLD          = "\033[1m"
              RED           = "\033[31m"
              BRIGHT_GREEN  = "\033[92m"
              BRIGHT_YELLOW = "\033[93m"
              BRIGHT_BLUE   = "\033[94m"
              BRIGHT_WHITE  = "\033[97m"
              CYAN          = "\033[36m"

          def c(color, text): return f"{color}{text}{C.RESET}"
          def header(text):
              bar = "═" * 60
              print(f"\n{c(C.BOLD + C.BRIGHT_BLUE, bar)}")
              print(c(C.BOLD + C.BRIGHT_WHITE, f"  {text}"))
              print(f"{c(C.BOLD + C.BRIGHT_BLUE, bar)}\n", flush=True)
          def ok(t):   print(f"  {c(C.BRIGHT_GREEN,  '✔')} {t}", flush=True)
          def warn(t): print(f"  {c(C.BRIGHT_YELLOW, '⚠')} {t}", flush=True)
          def err(t):  print(f"  {c(C.RED,           '✘')} {t}", flush=True)

          def set_variable(repo, name, value, token):
              """PATCH（更新）失败时自动 POST（创建），直接调用 REST API。"""
              headers = {
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "Content-Type": "application/json",
              }
              body = json.dumps({"name": name, "value": value}).encode()

              # 优先尝试更新
              url_var = f"https://api.github.com/repos/{repo}/actions/variables/{name}"
              req = urllib.request.Request(url_var, data=body, headers=headers, method="PATCH")
              try:
                  urllib.request.urlopen(req)
                  return "updated"
              except urllib.error.HTTPError as e:
                  if e.code != 404:
                      raise RuntimeError(f"PATCH {name} 失败 HTTP {e.code}: {e.read().decode()}")

              # 变量不存在，改为创建
              url_all = f"https://api.github.com/repos/{repo}/actions/variables"
              req = urllib.request.Request(url_all, data=body, headers=headers, method="POST")
              try:
                  urllib.request.urlopen(req)
                  return "created"
              except urllib.error.HTTPError as e:
                  raise RuntimeError(f"POST {name} 失败 HTTP {e.code}: {e.read().decode()}")

          header("保存版本号到 GitHub Variables")

          repo        = os.environ["REPO"]
          new_version = os.environ["NEW_VERSION"]
          new_code    = os.environ["NEW_CODE"]
          token       = os.environ.get("GH_TOKEN", "")

          if not token:
              err("GH_TOKEN 未配置，无法写入 Variables")
              err("请在仓库 Settings → Secrets 中配置 GH_TOKEN（需具备 repo 或 actions:write 权限）")
              sys.exit(1)

          # 诊断：区分 PAT（ghp_/github_pat_）与 GITHUB_TOKEN（ghs_）
          if token.startswith("ghs_"):
              warn("使用内置 GITHUB_TOKEN（ghs_…），依赖 'actions: write' 权限")
          else:
              ok("使用 PAT（secrets.GH_TOKEN）")

          failed = False
          for var_name, var_value in [
              ("APK_VERSION",      new_version),
              ("APK_VERSION_CODE", new_code),
          ]:
              try:
                  action = set_variable(repo, var_name, var_value, token)
                  ok(f"{var_name} → {var_value}（{action}）")
              except RuntimeError as e:
                  err(str(e))
                  failed = True

          if failed:
              warn("版本号未能持久化，下次构建可能从默认值重新计数")
              warn("请确认 GH_TOKEN 具备 repo 或 actions:write 权限")
              sys.exit(1)
          SCRIPT_END
        env:
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
          NEW_CODE:    ${{ steps.version.outputs.new_code }}

      - name: 📊 生成构建报告（Job Summary）
        if: always()
        run: |
          python3 <<'SCRIPT_END'
          import os

          summary_f   = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null")
          new_version = os.environ.get("NEW_VERSION",  "")
          new_code    = os.environ.get("NEW_CODE",     "")
          tag_name    = os.environ.get("TAG_NAME",     "")
          apk_name    = os.environ.get("APK_NAME",     "")
          signed_apk  = os.environ.get("SIGNED_APK",  "")
          event_name  = os.environ.get("GITHUB_EVENT_NAME", "push")
          bump_major  = os.environ.get("INPUT_BUMP_MAJOR", "false").lower() == "true"
          commit_sha  = os.environ.get("GITHUB_SHA",  "unknown")[:7]
          repo        = os.environ.get("REPO",         "")

          if event_name == "push":
              trigger = "自动构建（push 触发）"
          elif bump_major:
              trigger = "手动大版本升级"
          else:
              trigger = "手动构建"

          if signed_apk and os.path.exists(signed_apk):
              apk_size = f"{os.path.getsize(signed_apk) / 1024 / 1024:.1f} MB"
              status_line = f"✅ 构建成功"
          elif not new_version:
              status_line = "❌ 构建失败（版本计算阶段中止）"
              apk_size = "—"
          else:
              status_line = "⚠️ APK 未签名（KEYSTORE_BASE64 未配置）"
              apk_size = "—"

          lines = [
              f"## {status_line}",
              "",
              "| 字段 | 值 |",
              "|------|-----|",
              f"| 版本号 | `{new_version}` |" if new_version else "| 版本号 | — |",
              f"| VersionCode | `{new_code}` |" if new_code else "| VersionCode | — |",
              f"| Release 标签 | `{tag_name}` |" if tag_name else "| Release 标签 | — |",
              f"| APK 文件 | `{apk_name}` |" if apk_name else "| APK 文件 | — |",
              f"| APK 大小 | {apk_size} |",
              f"| 构建方式 | {trigger} |",
              f"| 源码提交 | `{commit_sha}` |",
              "",
          ]

          if signed_apk and tag_name:
              lines += [
                  f"### 下载",
                  f"前往 [Release {tag_name}](https://github.com/{repo}/releases/tag/{tag_name}) 下载签名 APK。",
                  "",
              ]

          if not os.environ.get("KEYSTORE_BASE64", "").strip():
              lines += [
                  "### ⚠️ 签名密钥未配置",
                  "APK 未签名，无法安装到 Android 设备。",
                  "请先运行 `gen-signing-key.yml` 生成签名密钥并配置以下 Secrets：",
                  "- `KEYSTORE_BASE64`",
                  "- `KEY_STORE_PASSWORD`",
                  "- `KEY_ALIAS`",
                  "- `KEY_PASSWORD`",
                  "",
              ]

          with open(summary_f, "w", encoding="utf-8") as f:
              f.write("\n".join(lines))
          SCRIPT_END
        env:
          NEW_VERSION:      ${{ steps.version.outputs.new_version }}
          NEW_CODE:         ${{ steps.version.outputs.new_code }}
          TAG_NAME:         ${{ steps.version.outputs.tag_name }}
          APK_NAME:         ${{ steps.version.outputs.apk_name }}
          SIGNED_APK:       ${{ steps.sign.outputs.signed_apk }}
          INPUT_BUMP_MAJOR: ${{ inputs.bump_major }}
          KEYSTORE_BASE64:  ${{ secrets.KEYSTORE_BASE64 }}
