      - name: 🎵 转换 HCA 音频为 OGG（vgmstream + ffmpeg）
        run: |
          python3 <<'SCRIPT_END'
          import json, os, subprocess, sys, urllib.request, tarfile, zipfile

          sys.stdout.reconfigure(line_buffering=True)

          def run(cmd):
              return subprocess.run(cmd, shell=True, capture_output=True, text=True)

          # 安装 ffmpeg
          run('sudo apt-get install -y ffmpeg > /dev/null 2>&1')

          # 通过 GitHub releases API 动态获取最新 vgmstream Linux CLI 资产链接
          print("[vgmstream] 查询最新 release...")
          req = urllib.request.Request(
              "https://api.github.com/repos/vgmstream/vgmstream/releases/latest",
              headers={"User-Agent": "magireco-cnv-ci"}
          )
          with urllib.request.urlopen(req) as resp:
              data = json.loads(resp.read())

          vgms_url = ""
          for asset in data.get('assets', []):
              n = asset['name'].lower()
              if 'linux' in n and '.sig' not in n and (n.endswith('.tar.gz') or n.endswith('.zip')):
                  vgms_url = asset['browser_download_url']
                  break

          if not vgms_url:
              print("::warning::找不到 vgmstream Linux release 资产，跳过 HCA 转换")
              sys.exit(0)

          print(f"[vgmstream] 下载: {vgms_url}")
          urllib.request.urlretrieve(vgms_url, '/tmp/vgmstream_pkg')

          os.makedirs('/tmp/vgmstream_dir', exist_ok=True)
          if vgms_url.endswith('.zip'):
              with zipfile.ZipFile('/tmp/vgmstream_pkg') as zf:
                  zf.extractall('/tmp/vgmstream_dir')
          else:
              with tarfile.open('/tmp/vgmstream_pkg', 'r:gz') as tf:
                  tf.extractall('/tmp/vgmstream_dir')

          vgms_bin = None
          for root, _, files in os.walk('/tmp/vgmstream_dir'):
              for f in files:
                  if f == 'vgmstream-cli':
                      vgms_bin = os.path.join(root, f)
                      os.chmod(vgms_bin, 0o755)
                      break
              if vgms_bin:
                  break

          if not vgms_bin:
              print("::warning::解包后找不到 vgmstream-cli，跳过 HCA 转换")
              sys.exit(0)
          print(f"[vgmstream] 使用: {vgms_bin}")

          hca_files = []
          for root, _, files in os.walk('assets/resource/sound_native'):
              for f in files:
                  if f.endswith('.hca'):
                      hca_files.append(os.path.join(root, f))

          if not hca_files:
              print("未找到 .hca 文件，跳过转换")
              sys.exit(0)

          for hca in hca_files:
              wav_tmp = hca[:-4] + '.wav'
              ogg_out = hca[:-4] + '.ogg'
              print(f"[HCA→OGG] 转换 {hca}")
              r = run(f'"{vgms_bin}" -o "{wav_tmp}" "{hca}"')
              if r.returncode != 0:
                  print(f"  ✘ vgmstream 失败: {r.stderr.strip()}")
                  continue
              r = run(f'ffmpeg -y -i "{wav_tmp}" -c:a libvorbis -q:a 5 "{ogg_out}" 2>/dev/null')
              if os.path.exists(wav_tmp):
                  os.remove(wav_tmp)
              if r.returncode != 0:
                  print(f"  ✘ ffmpeg 失败")
                  continue
              print(f"  ✔ 生成 {ogg_out} ({os.path.getsize(ogg_out)//1024} KB)")
          SCRIPT_END

